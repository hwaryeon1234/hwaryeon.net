<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows Update</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1b7fcc;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    color: #fff;
    cursor: none;
    user-select: none;
    -webkit-user-select: none;
  }

  .spinner {
    width: 90px;
    height: 90px;
    border: 4px solid transparent;
    border-top: 4px solid #fff;
    border-radius: 50%;
    animation: spin 1.8s linear infinite;
    margin-bottom: 50px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .text-main {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  .text-sub {
    font-size: 16px;
    font-weight: 300;
    opacity: 0.85;
    margin-bottom: 8px;
  }

  .percent {
    font-size: 64px;
    font-weight: 200;
    margin-bottom: 30px;
    letter-spacing: -1px;
  }

  .text-warn {
    font-size: 14px;
    font-weight: 300;
    opacity: 0.7;
    position: absolute;
    bottom: 60px;
  }

  /* BSOD */
  .bsod {
    display: none;
    position: fixed;
    inset: 0;
    background: #0078d7;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 10% 12%;
    z-index: 999;
  }

  .bsod.active {
    display: flex;
  }

  .bsod-face {
    font-size: 120px;
    font-weight: 200;
    margin-bottom: 30px;
  }

  .bsod-title {
    font-size: 24px;
    font-weight: 400;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .bsod-detail {
    font-size: 14px;
    font-weight: 300;
    opacity: 0.9;
    line-height: 1.8;
    max-width: 700px;
  }

  .bsod-percent {
    font-size: 14px;
    margin-top: 30px;
    opacity: 0.9;
  }

  .bsod-qr {
    width: 80px;
    height: 80px;
    background: #fff;
    margin-top: 20px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bsod-qr-inner {
    width: 60px;
    height: 60px;
    background: repeating-conic-gradient(#000 0% 25%, #fff 0% 50%) 0 0 / 12px 12px;
  }

  /* Fullscreen hint */
  .hint {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
  }

  .hint-sub {
    font-size: 15px;
    opacity: 0.6;
    margin-top: 12px;
  }

  .hint.hidden { display: none; }
</style>
</head>
<body>

<!-- Fullscreen hint overlay -->
<div class="hint" id="hint" onclick="goFullscreen()">
  <div>🖥️ 클릭하면 전체 화면으로 시작합니다</div>
  <div class="hint-sub">F11을 눌러도 전체화면이 됩니다</div>
</div>

<!-- Update screen -->
<div class="spinner"></div>
<div class="text-main">업데이트를 진행하고 있습니다</div>
<div class="percent" id="percent">0%</div>
<div class="text-sub">PC를 켜 두세요. 시간이 좀 걸릴 수 있습니다.</div>
<div class="text-warn">PC가 여러 번 다시 시작됩니다. 잠시 기다려 주세요.</div>

<!-- BSOD -->
<div class="bsod" id="bsod">
  <div class="bsod-face">:(</div>
  <div class="bsod-title">PC에 문제가 발생하여 다시 시작해야 합니다.<br>일부 오류 정보를 수집한 다음, 자동으로 다시 시작합니다.</div>
  <div class="bsod-percent" id="bsod-percent">0% 완료</div>
  <div class="bsod-detail">
    자세한 정보를 알아보려면 나중에 다음 오류를 온라인에서 검색하세요:<br>
    CRITICAL_PROCESS_DIED
  </div>
  <div class="bsod-qr"><div class="bsod-qr-inner"></div></div>
</div>

<script>
  let percent = 0;
  let bsodTriggered = false;
  let phase = 'update'; // 'update' | 'bsod' | 'restart'

  function goFullscreen() {
    document.documentElement.requestFullscreen?.() ||
    document.documentElement.webkitRequestFullscreen?.();
    document.getElementById('hint').classList.add('hidden');
  }

  // Block common escape keys
  document.addEventListener('keydown', (e) => {
    // Block Escape, Alt+F4, Ctrl+W, Alt+Tab
    if (e.key === 'Escape' || 
        (e.altKey && e.key === 'F4') ||
        (e.ctrlKey && e.key === 'w')) {
      e.preventDefault();
    }
  });

  // Slow, frustrating progress
  function tick() {
    if (phase === 'update') {
      if (percent < 28) {
        percent += Math.random() * 1.2;
      } else if (percent < 42) {
        percent += Math.random() * 0.3;
      } else if (percent < 60) {
        percent += Math.random() * 0.8;
      } else if (percent < 78) {
        percent += Math.random() * 0.15;
      } else if (percent < 88) {
        percent += Math.random() * 0.5;
      } else if (percent < 97) {
        percent += Math.random() * 0.08;
      } else {
        // Trigger BSOD at ~97%
        if (!bsodTriggered) {
          bsodTriggered = true;
          setTimeout(showBSOD, 2000);
        }
        percent = Math.min(percent + 0.01, 97);
      }

      // Occasional pause/jump back
      if (Math.random() < 0.03 && percent > 30) {
        percent -= Math.random() * 3;
      }

      document.getElementById('percent').textContent = Math.floor(percent) + '%';
    }
  }

  function showBSOD() {
    phase = 'bsod';
    document.getElementById('bsod').classList.add('active');
    
    let bsodPercent = 0;
    const bsodInterval = setInterval(() => {
      bsodPercent += Math.random() * 2;
      if (bsodPercent >= 100) {
        bsodPercent = 100;
        clearInterval(bsodInterval);
        setTimeout(restartUpdate, 3000);
      }
      document.getElementById('bsod-percent').textContent = Math.floor(bsodPercent) + '% 완료';
    }, 800);
  }

  function restartUpdate() {
    document.getElementById('bsod').classList.remove('active');
    phase = 'update';
    percent = 0;
    bsodTriggered = false;
    document.getElementById('percent').textContent = '0%';
  }

  setInterval(tick, 1200);
</script>
</body>
</html>
